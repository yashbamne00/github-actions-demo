name : CICD
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on : ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest
        
